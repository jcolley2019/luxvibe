<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary meta -->
    <title>Luxvibe – Luxury Hotel Deals & Boutique Stays Worldwide</title>
    <meta name="description" content="Discover and book luxury hotels, boutique resorts, and unique stays worldwide. Compare prices, read reviews, and find your perfect escape with Luxvibe." />
    <meta name="keywords" content="luxury hotels, boutique hotels, hotel deals, hotel booking, resort booking, travel, vacation" />
    <link rel="canonical" href="https://luxvibe.io/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Luxvibe" />
    <meta property="og:url" content="https://luxvibe.io/" />
    <meta property="og:title" content="Luxvibe – Luxury Hotel Deals & Boutique Stays Worldwide" />
    <meta property="og:description" content="Discover and book luxury hotels, boutique resorts, and unique stays worldwide. Compare prices, read reviews, and find your perfect escape." />
    <meta property="og:image" content="https://luxvibe.io/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@luxvibe" />
    <meta name="twitter:title" content="Luxvibe – Luxury Hotel Deals & Boutique Stays Worldwide" />
    <meta name="twitter:description" content="Discover and book luxury hotels, boutique resorts, and unique stays worldwide. Compare prices and find your perfect escape." />
    <meta name="twitter:image" content="https://luxvibe.io/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Fonts: only the two actually used -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- Preconnect to image and API CDNs -->
    <link rel="preconnect" href="https://static.cupid.travel" />
    <link rel="dns-prefetch" href="//images.unsplash.com" />
    <link rel="dns-prefetch" href="//api.liteapi.travel" />

    <!-- Structured data: Hotel Search Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Luxvibe",
      "url": "https://luxvibe.io",
      "description": "Discover and book luxury hotels, boutique resorts, and unique stays worldwide.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://luxvibe.io/?destination={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Luxvibe",
      "url": "https://luxvibe.io",
      "logo": "https://luxvibe.io/favicon.png",
      "description": "Luxury hotel booking platform offering curated stays worldwide.",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
