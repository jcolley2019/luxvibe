<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary meta -->
    <title>Luxvibe – Luxury Hotels & Flights Worldwide</title>
    <meta name="description" content="Luxvibe is a luxury hotel and flight booking platform. Search 2M+ hotels across 190+ countries and flights on hundreds of airlines. AI-powered search, real-time pricing, instant confirmation." />
    <meta name="keywords" content="luxury hotels, boutique hotels, hotel deals, hotel booking, flight booking, cheap flights, resort booking, luxury travel, 5-star hotels, boutique resorts, travel deals, vacation hotels, flights and hotels" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="application-name" content="Luxvibe" />
    <meta name="author" content="Luxvibe" />
    <link rel="canonical" href="https://luxvibe.io/" />

    <!-- Signal to AI crawlers where to find the plain-text description -->
    <link rel="alternate" type="text/plain" title="Luxvibe for AI/LLMs" href="https://luxvibe.io/llms.txt" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Luxvibe" />
    <meta property="og:url" content="https://luxvibe.io" />
    <meta property="og:title" content="Luxvibe — Luxury Hotels & Flights. Unbeatable Rates." />
    <meta property="og:description" content="Discover and book luxury hotels and flights worldwide. AI-powered search, 2M+ hotels, hundreds of airlines, 190+ countries." />
    <meta property="og:image" content="https://luxvibe.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@luxvibe" />
    <meta name="twitter:title" content="Luxvibe — Luxury Hotels & Flights. Unbeatable Rates." />
    <meta name="twitter:description" content="Discover and book luxury hotels and flights worldwide. AI-powered search, 2M+ hotels, hundreds of airlines, 190+ countries." />
    <meta name="twitter:image" content="https://luxvibe.io/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon-32.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/favicon-180.png" sizes="180x180" />

    <!-- Fonts: only the two actually used -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- Preconnect to image and API CDNs -->
    <link rel="preconnect" href="https://static.cupid.travel" />
    <link rel="dns-prefetch" href="//images.unsplash.com" />
    <link rel="dns-prefetch" href="//api.liteapi.travel" />

    <!-- Structured data: Hotel Search Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Luxvibe",
      "url": "https://luxvibe.io",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://luxvibe.io/?destination={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Luxvibe",
      "url": "https://luxvibe.io",
      "logo": "https://luxvibe.io/logo.png",
      "description": "Luxury hotel booking platform with 2M+ hotels across 190+ countries, powered by liteAPI",
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "email": "bookings@luxvibe.io",
          "contactType": "customer service"
        },
        {
          "@type": "ContactPoint",
          "email": "hello@luxvibe.io",
          "contactType": "public relations"
        }
      ],
      "sameAs": [
        "https://x.com/luxvibe",
        "https://twitter.com/luxvibe",
        "https://www.instagram.com/luxvibe",
        "https://www.linkedin.com/company/luxvibe"
      ]
    }
    </script>

    <!-- Structured data: Travel Agency / Online Booking Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Luxvibe",
      "url": "https://luxvibe.io",
      "description": "Luxvibe is an online luxury hotel and flight booking platform. Search and book 5-star hotels, boutique resorts, and flights across 190+ countries. Features include AI-powered vibe search, hotel comparison, flight booking, price trend charts, and an AI travel concierge named Luxe.",
      "areaServed": "Worldwide",
      "priceRange": "$$-$$$$",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Luxury Hotels & Flights",
        "description": "Curated selection of 5-star hotels, boutique resorts, and unique properties worldwide, plus flight booking on hundreds of airlines"
      },
      "knowsAbout": [
        "luxury hotels",
        "boutique resorts",
        "5-star hotels",
        "hotel booking",
        "flight booking",
        "travel planning",
        "hotel comparison",
        "AI travel recommendations",
        "booking amendments",
        "loyalty points",
        "promo codes"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
